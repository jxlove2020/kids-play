<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>스네이크 게임</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0d1b2a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="놀이터" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nanum Gothic', 'Apple SD Gothic Neo', sans-serif;
      background: #0d1b2a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 16px;
      user-select: none;
      -webkit-user-select: none;
      overscroll-behavior: none;
      color: #fff;
    }
    .top-bar {
      width: 100%;
      max-width: 420px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .back {
      text-decoration: none;
      color: #fff;
      font-size: 0.9rem;
      background: rgba(255,255,255,0.12);
      padding: 6px 14px;
      border-radius: 16px;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .back:hover { background: rgba(255,255,255,0.22); }
    h1 { font-size: 1.5rem; flex: 1; text-align: center; }
    #modeBadge {
      font-size: 0.72rem;
      font-weight: 700;
      background: rgba(57,255,20,0.15);
      border: 1px solid rgba(57,255,20,0.5);
      padding: 4px 9px;
      border-radius: 10px;
      white-space: nowrap;
      color: #39ff14;
      flex-shrink: 0;
    }
    .overlay-mode-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin: 10px 0 16px;
    }
    .mode-btn {
      padding: 7px 18px;
      font-size: 0.88rem;
      font-weight: 700;
      border: 2px solid rgba(255,255,255,0.25);
      border-radius: 20px;
      background: transparent;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      transition: all 0.15s;
    }
    .mode-btn.active {
      background: #39ff14;
      border-color: #39ff14;
      color: #0d1b2a;
    }
    .info-bar {
      display: flex;
      gap: 14px;
      margin-bottom: 10px;
    }
    .info-bar span {
      background: rgba(255,255,255,0.1);
      padding: 5px 14px;
      border-radius: 14px;
      font-size: 0.9rem;
      font-weight: 700;
    }
    canvas {
      border: 2px solid rgba(57,255,20,0.35);
      border-radius: 8px;
      display: block;
      background: #0a1628;
      touch-action: none;
    }
    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 56px);
      grid-template-rows: repeat(3, 56px);
      gap: 4px;
      margin-top: 14px;
    }
    .dpad-btn {
      width: 56px;
      height: 56px;
      border: none;
      border-radius: 12px;
      background: rgba(57,255,20,0.18);
      color: #39ff14;
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .dpad-btn:active { background: rgba(57,255,20,0.4); transform: scale(0.93); }
    .dpad-empty { background: transparent; }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .overlay.show { display: flex; }
    .box {
      background: #1a2e45;
      border: 2px solid rgba(57,255,20,0.4);
      border-radius: 28px;
      padding: 28px 32px;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 30px rgba(57,255,20,0.1);
      max-width: 340px;
      width: 92%;
    }
    .box .em { font-size: 3.2rem; margin-bottom: 10px; }
    .box h2 { font-size: 1.7rem; color: #39ff14; margin-bottom: 8px; }
    .box .result-score { font-size: 1.1rem; color: #aaa; margin-bottom: 4px; }
    .box .result-best { font-size: 0.9rem; color: #39ff14; margin-bottom: 24px; }
    .box-btns { display: flex; flex-direction: column; gap: 10px; }
    .box-btns button {
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 16px;
      cursor: pointer;
    }
    .btn-play { background: #39ff14; color: #0d1b2a; }
    .btn-back { background: rgba(255,255,255,0.1); color: #ccc; }

    @media (max-height: 680px) {
      body { padding: 6px 12px; }
      h1 { font-size: 1.2rem; }
      .dpad-btn { width: 48px; height: 48px; font-size: 1.2rem; }
      .dpad { grid-template-columns: repeat(3, 48px); grid-template-rows: repeat(3, 48px); gap: 3px; margin-top: 8px; }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <a class="back" href="index.html">← 놀이터로</a>
    <h1>🐍 스네이크</h1>
    <span id="modeBadge">쉬움</span>
  </div>

  <div class="info-bar">
    <span>🏆 <span id="bestScore">0</span></span>
    <span>⭐ <span id="curScore">0</span></span>
    <span id="modeLabel">벽 통과</span>
  </div>

  <canvas id="c"></canvas>

  <div class="dpad">
    <div class="dpad-empty"></div>
    <button class="dpad-btn" id="dUp"    onpointerdown="btnDir(0,-1)">▲</button>
    <div class="dpad-empty"></div>
    <button class="dpad-btn" id="dLeft"  onpointerdown="btnDir(-1,0)">◄</button>
    <div class="dpad-empty"></div>
    <button class="dpad-btn" id="dRight" onpointerdown="btnDir(1,0)">►</button>
    <div class="dpad-empty"></div>
    <button class="dpad-btn" id="dDown"  onpointerdown="btnDir(0,1)">▼</button>
    <div class="dpad-empty"></div>
  </div>

  <div class="overlay show" id="overlay">
    <div class="box">
      <div class="em" id="boxEm">🐍</div>
      <h2 id="boxTitle">스네이크 게임</h2>
      <div class="result-score" id="boxScore"></div>
      <div class="result-best"  id="boxBest"></div>
      <div class="overlay-mode-bar">
        <button class="mode-btn active" id="m-easy"   onclick="setMode('easy')">쉬움</button>
        <button class="mode-btn"        id="m-normal" onclick="setMode('normal')">보통</button>
        <button class="mode-btn"        id="m-hard"   onclick="setMode('hard')">어려움</button>
      </div>
      <div class="box-btns">
        <button class="btn-play" onclick="startGame()">🎮 시작!</button>
        <a class="btn-back" href="index.html" style="display:block;padding:12px 24px;font-size:1rem;font-weight:700;border-radius:16px;text-align:center;text-decoration:none;">← 놀이터로</a>
      </div>
    </div>
  </div>

  <script>
    const COLS = 20, ROWS = 20;
    const BEST_KEY = 'snake-best';
    const MODES = {
      easy:   { label: '벽 통과', wrap: true,  baseMs: 180, minMs: 100 },
      normal: { label: '벽 충돌', wrap: false, baseMs: 150, minMs:  80 },
      hard:   { label: '초고속',  wrap: false, baseMs: 100, minMs:  55 },
    };

    let mode = 'easy';
    let snake, dir, nextDir, food, special, score, gameRunning, loopId;
    let canvas, ctx, cell;

    function bestScore() { return parseInt(localStorage.getItem(BEST_KEY) || '0'); }
    function saveBest(s) { if (s > bestScore()) localStorage.setItem(BEST_KEY, s); }

    function initCanvas() {
      canvas = document.getElementById('c');
      const size = Math.max(120, Math.min(window.innerWidth - 32, window.innerHeight - 260, 380));
      cell = Math.max(4, Math.floor(size / COLS));
      canvas.width  = cell * COLS;
      canvas.height = cell * ROWS;
      ctx = canvas.getContext('2d');
    }

    const MODE_NAMES = { easy:'쉬움', normal:'보통', hard:'어려움' };

    function setMode(m) {
      mode = m;
      ['easy','normal','hard'].forEach(k => document.getElementById('m-'+k).classList.toggle('active', k === m));
      document.getElementById('modeLabel').textContent = MODES[m].label;
      document.getElementById('modeBadge').textContent = MODE_NAMES[m];
      if (!gameRunning) drawIdle();
    }

    function startGame() {
      initCanvas();
      document.getElementById('overlay').classList.remove('show');
      snake = [{x:10, y:10},{x:9,y:10},{x:8,y:10}];
      dir = {x:1, y:0}; nextDir = {x:1, y:0};
      score = 0; special = null;
      document.getElementById('curScore').textContent = 0;
      document.getElementById('bestScore').textContent = bestScore();
      placeFood();
      gameRunning = true;
      clearTimeout(loopId);
      loop();
    }

    function placeFood() {
      const occupied = new Set(snake.map(s => s.x+','+s.y));
      if (special) occupied.add(special.x+','+special.y);
      let f;
      do { f = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)}; }
      while (occupied.has(f.x+','+f.y));
      food = f;
    }

    function placeSpecial() {
      const occupied = new Set(snake.map(s => s.x+','+s.y));
      occupied.add(food.x+','+food.y);
      let f;
      do { f = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)}; }
      while (occupied.has(f.x+','+f.y));
      special = f;
      setTimeout(() => { special = null; draw(); }, 5000);
    }

    function loop() {
      if (!gameRunning) return;
      dir = nextDir;
      const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

      if (MODES[mode].wrap) {
        head.x = (head.x + COLS) % COLS;
        head.y = (head.y + ROWS) % ROWS;
      } else {
        if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) { endGame(); return; }
      }

      if (snake.some(s => s.x === head.x && s.y === head.y)) { endGame(); return; }

      snake.unshift(head);

      let ate = false;
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        ate = true;
        placeFood();
        if (score % 50 === 0 && !special) placeSpecial();
      } else if (special && head.x === special.x && head.y === special.y) {
        score += 30;
        ate = true;
        special = null;
      }

      if (!ate) snake.pop();
      document.getElementById('curScore').textContent = score;

      draw();

      const m = MODES[mode];
      const speed = Math.max(m.minMs, m.baseMs - Math.floor(score / 30) * 5);
      loopId = setTimeout(loop, speed);
    }

    function endGame() {
      gameRunning = false;
      clearTimeout(loopId);
      saveBest(score);
      const best = bestScore();
      const isNew = score >= best && score > 0;
      document.getElementById('boxEm').textContent    = isNew ? '🏆' : '💀';
      document.getElementById('boxTitle').textContent = isNew ? '최고 기록!' : '게임 오버';
      document.getElementById('boxScore').textContent = `점수: ${score}점`;
      document.getElementById('boxBest').textContent  = isNew ? '🌟 새 최고 기록!' : `최고: ${best}점`;
      document.getElementById('bestScore').textContent = best;
      document.getElementById('overlay').classList.add('show');
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x+r, y);
      ctx.lineTo(x+w-r, y);
      ctx.arcTo(x+w, y, x+w, y+r, r);
      ctx.lineTo(x+w, y+h-r);
      ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
      ctx.lineTo(x+r, y+h);
      ctx.arcTo(x, y+h, x, y+h-r, r);
      ctx.lineTo(x, y+r);
      ctx.arcTo(x, y, x+r, y, r);
      ctx.closePath();
    }

    function draw() {
      if (!ctx) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // grid
      ctx.strokeStyle = 'rgba(57,255,20,0.06)';
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= COLS; x++) { ctx.beginPath(); ctx.moveTo(x*cell,0); ctx.lineTo(x*cell,canvas.height); ctx.stroke(); }
      for (let y = 0; y <= ROWS; y++) { ctx.beginPath(); ctx.moveTo(0,y*cell); ctx.lineTo(canvas.width,y*cell); ctx.stroke(); }

      // food
      ctx.fillStyle = '#ff4444';
      ctx.font = `${cell*0.75}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🍎', food.x*cell + cell/2, food.y*cell + cell/2);

      // special
      if (special) {
        ctx.fillText('⭐', special.x*cell + cell/2, special.y*cell + cell/2);
      }

      // snake body
      snake.forEach((s, i) => {
        const g = i === 0 ? 1 : Math.max(0.35, 1 - i/snake.length * 0.7);
        ctx.fillStyle = i === 0 ? '#39ff14' : `rgba(57,255,20,${g})`;
        const pad = i === 0 ? 1 : 2;
        roundRect(s.x*cell+pad, s.y*cell+pad, cell-pad*2, cell-pad*2, Math.max(2, cell*0.2));
        ctx.fill();
      });

      // eyes on head
      const h = snake[0];
      const ex = h.x*cell + cell/2;
      const ey = h.y*cell + cell/2;
      const er = Math.max(2, cell*0.12);
      const eo = cell * 0.22;
      ctx.fillStyle = '#0d1b2a';
      // offset eyes based on direction
      const dx = dir.x, dy = dir.y;
      const perp = {x: -dy, y: dx};
      [[1,-1],[1,1]].forEach(([a,b]) => {
        const eyeX = ex + dx*eo + perp.x*eo*b;
        const eyeY = ey + dy*eo + perp.y*eo*b;
        ctx.beginPath(); ctx.arc(eyeX, eyeY, er, 0, Math.PI*2); ctx.fill();
      });
    }

    function drawIdle() {
      if (!ctx) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = 'rgba(57,255,20,0.06)';
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= COLS; x++) { ctx.beginPath(); ctx.moveTo(x*cell,0); ctx.lineTo(x*cell,canvas.height); ctx.stroke(); }
      for (let y = 0; y <= ROWS; y++) { ctx.beginPath(); ctx.moveTo(0,y*cell); ctx.lineTo(canvas.width,y*cell); ctx.stroke(); }
    }

    // controls
    function btnDir(dx, dy) {
      if (!gameRunning) return;
      if (dx !== 0 && dir.x !== 0) return;
      if (dy !== 0 && dir.y !== 0) return;
      nextDir = {x: dx, y: dy};
    }

    document.addEventListener('keydown', e => {
      if (!gameRunning) return;
      const map = {
        ArrowUp:['w','W'], ArrowDown:['s','S'], ArrowLeft:['a','A'], ArrowRight:['d','D']
      };
      if (e.key === 'ArrowUp'    || e.key === 'w' || e.key === 'W') { if (dir.y === 0) nextDir = {x:0,y:-1}; }
      if (e.key === 'ArrowDown'  || e.key === 's' || e.key === 'S') { if (dir.y === 0) nextDir = {x:0,y:1}; }
      if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') { if (dir.x === 0) nextDir = {x:-1,y:0}; }
      if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') { if (dir.x === 0) nextDir = {x:1,y:0}; }
    });

    // swipe
    let touchStart = null;
    canvas.addEventListener('touchstart', e => { touchStart = {x: e.touches[0].clientX, y: e.touches[0].clientY}; }, {passive:true});
    canvas.addEventListener('touchend', e => {
      if (!touchStart || !gameRunning) return;
      const dx = e.changedTouches[0].clientX - touchStart.x;
      const dy = e.changedTouches[0].clientY - touchStart.y;
      if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
      if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 0 && dir.x === 0) nextDir = {x:1,y:0};
        if (dx < 0 && dir.x === 0) nextDir = {x:-1,y:0};
      } else {
        if (dy > 0 && dir.y === 0) nextDir = {x:0,y:1};
        if (dy < 0 && dir.y === 0) nextDir = {x:0,y:-1};
      }
      touchStart = null;
    }, {passive:true});

    // D-pad pointer
    document.querySelectorAll('.dpad-btn').forEach(btn => {
      btn.addEventListener('pointerdown', e => e.preventDefault());
    });

    initCanvas();
    document.getElementById('bestScore').textContent = bestScore();
    document.getElementById('modeLabel').textContent = MODES[mode].label;
    drawIdle();
  </script>
  <script>
    document.addEventListener('touchmove', e => {
      if (e.cancelable && document.body.scrollHeight <= window.innerHeight) e.preventDefault();
    }, { passive: false });
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
    }
  </script>
</body>
</html>
