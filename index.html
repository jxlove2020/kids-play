<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>어린이 놀이터</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#667eea" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="놀이터" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nanum Gothic', 'Apple SD Gothic Neo', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 44px;
    }
    header h1 {
      font-size: 2.4rem;
      color: #fff;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
      margin-bottom: 6px;
    }
    header p {
      font-size: 1rem;
      color: rgba(255,255,255,0.8);
    }

    .icon-grid {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      gap: 20px;
    }
    @media (min-width: 500px) {
      .icon-grid { grid-template-columns: repeat(6, 100px); }
    }

    .icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      padding: 12px 8px;
      border-radius: 18px;
      transition: background 0.15s, transform 0.15s;
    }
    .icon:hover  { background: rgba(255,255,255,0.18); transform: scale(1.08); }
    .icon:active { transform: scale(0.96); }

    .icon-face {
      width: 76px;
      height: 76px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      box-shadow: 0 6px 22px rgba(0,0,0,0.28);
    }

    .icon-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 5px rgba(0,0,0,0.55);
      text-align: center;
      line-height: 1.4;
    }

    /* 아이콘 색상 */
    .c-number  { background: linear-gradient(145deg, #ff8a80, #e53935); }
    .c-capital { background: linear-gradient(145deg, #64b5f6, #1565c0); }
    .c-memory  { background: linear-gradient(145deg, #69f0ae, #2e7d32); }
    .c-whack   { background: linear-gradient(145deg, #d4e157, #558b2f); }
    .c-dodge   { background: linear-gradient(145deg, #ce93d8, #6a1b9a); }
    .c-simon   { background: linear-gradient(145deg, #ffe082, #e65100); }
    .c-stop    { background: linear-gradient(145deg, #d8b4fe, #7c3aed); }
    .c-snake   { background: linear-gradient(145deg, #39ff14, #166534); }
    .c-rhythm  { background: linear-gradient(145deg, #f0abfc, #7e22ce); }
    .c-tetris  { background: linear-gradient(145deg, #c4b5fd, #4c1d95); }
    .c-mines   { background: linear-gradient(145deg, #4fc3f7, #0d47a1); }

    .settings-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.22);
      color: #fff;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      z-index: 5;
    }
    .settings-btn:hover  { background: rgba(255,255,255,0.38); }
    .settings-btn:active { background: rgba(255,255,255,0.55); }

    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 20;
    }
    .modal-bg.show { display: flex; }
    .modal {
      background: #fff;
      border-radius: 24px;
      padding: 32px 28px;
      width: 90%;
      max-width: 300px;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    }
    .modal h2 { font-size: 1.2rem; color: #333; margin-bottom: 10px; }
    .modal p  { font-size: 0.88rem; color: #888; margin-bottom: 24px; line-height: 1.6; }
    .modal-btns { display: flex; gap: 10px; }
    .modal-btns button {
      flex: 1;
      padding: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      cursor: pointer;
    }
    .btn-cancel  { background: #f1f3f5; color: #555; }
    .btn-confirm { background: #667eea; color: #fff; }

    @media (orientation: landscape) and (max-height: 500px) {
      body    { padding: 14px 20px; justify-content: flex-start; }
      header  { margin-bottom: 16px; }
      header h1 { font-size: 1.6rem; }
      header p  { font-size: 0.85rem; }
      .icon-grid {
        grid-template-columns: repeat(6, 80px);
        gap: 12px;
      }
      .icon-face  { width: 60px; height: 60px; font-size: 1.9rem; border-radius: 14px; }
      .icon-label { font-size: 0.62rem; }
    }
  </style>
</head>
<body>

  <button class="settings-btn" onclick="document.getElementById('modal').classList.add('show')" title="설정">⚙️</button>

  <div class="modal-bg" id="modal">
    <div class="modal">
      <h2>⚙️ 설정</h2>
      <p>캐시를 초기화하면<br/>최신 버전으로 새로고침됩니다.</p>
      <div class="modal-btns">
        <button class="btn-cancel"  onclick="document.getElementById('modal').classList.remove('show')">취소</button>
        <button class="btn-confirm" onclick="clearCache()">캐시 초기화</button>
      </div>
    </div>
  </div>

  <header>
    <h1>🎮 어린이 놀이터</h1>
    <p>하고 싶은 놀이를 골라봐요!</p>
  </header>

  <div class="icon-grid">

    <a class="icon" href="number-guess.html">
      <div class="icon-face c-number">🔢</div>
      <div class="icon-label">Up&Down<br/>수 맞추기</div>
    </a>

    <a class="icon" href="country-capital.html">
      <div class="icon-face c-capital">🌍</div>
      <div class="icon-label">나라&수도<br/>맞추기</div>
    </a>

    <a class="icon" href="memory-game.html">
      <div class="icon-face c-memory">🃏</div>
      <div class="icon-label">기억력<br/>게임</div>
    </a>

    <a class="icon" href="whack-a-mole.html">
      <div class="icon-face c-whack">🥍</div>
      <div class="icon-label">개구리<br/>잡기</div>
    </a>

    <a class="icon" href="dodge.html">
      <div class="icon-face c-dodge">🐭</div>
      <div class="icon-label">두더지<br/>피하기</div>
    </a>

    <a class="icon" href="simon.html">
      <div class="icon-face c-simon">🎨</div>
      <div class="icon-label">색 순서<br/>기억</div>
    </a>

    <a class="icon" href="stopwatch.html">
      <div class="icon-face c-stop">⏱</div>
      <div class="icon-label">스탑워치<br/>게임</div>
    </a>

    <a class="icon" href="snake.html">
      <div class="icon-face c-snake">🐍</div>
      <div class="icon-label">스네이크<br/>게임</div>
    </a>

    <a class="icon" href="rhythm.html">
      <div class="icon-face c-rhythm">🎵</div>
      <div class="icon-label">리듬<br/>게임</div>
    </a>

    <a class="icon" href="tetris.html">
      <div class="icon-face c-tetris">🧩</div>
      <div class="icon-label">테트리스</div>
    </a>

    <a class="icon" href="minesweeper.html">
      <div class="icon-face c-mines">💣</div>
      <div class="icon-label">지뢰찾기</div>
    </a>

  </div>


  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
    }

    async function clearCache() {
      document.getElementById('modal').classList.remove('show');
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(r => r.unregister()));
      }
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
      location.reload();
    }
  </script>
</body>
</html>
