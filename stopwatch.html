<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>스탑워치</title>
  <link rel="manifest" href="manifest.json?v=25" />
  <meta name="theme-color" content="#302b63" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="놀이터" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <style>
    :root { --beat: 1s; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nanum Gothic', 'Apple SD Gothic Neo', sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      color: #fff;
      user-select: none;
      -webkit-user-select: none;
      overscroll-behavior: none;
    }

    .back {
      align-self: flex-start;
      text-decoration: none;
      color: rgba(255,255,255,0.8);
      font-size: 1rem;
      margin-bottom: 14px;
      background: rgba(255,255,255,0.1);
      padding: 8px 16px;
      border-radius: 20px;
      transition: background 0.2s;
    }
    .back:hover { background: rgba(255,255,255,0.2); }

    h1 {
      font-size: 1.9rem;
      color: #fff;
      text-shadow: 0 0 24px rgba(178,102,255,0.7);
      margin-bottom: 10px;
    }

    .hud {
      display: flex;
      gap: 14px;
      margin-bottom: 20px;
    }
    .hud span {
      background: rgba(255,255,255,0.1);
      padding: 6px 18px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.95rem;
    }

    .target-area {
      text-align: center;
      margin-bottom: 22px;
    }
    .target-label {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 3px;
      margin-bottom: 6px;
    }
    .target-time {
      font-size: 4rem;
      font-weight: 900;
      color: #c084fc;
      text-shadow: 0 0 32px rgba(192,132,252,0.6);
      letter-spacing: 2px;
      line-height: 1;
    }
    .target-time .unit {
      font-size: 1.6rem;
      font-weight: 400;
      color: rgba(255,255,255,0.5);
    }

    /* 펄스 링 */
    .pulse-wrap {
      position: relative;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    .ring-outer {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(192,132,252,0.15);
    }
    .ring-spin {
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: #c084fc;
      border-right-color: rgba(192,132,252,0.3);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .running .ring-spin {
      opacity: 1;
      animation: spin var(--beat) linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .ring-inner {
      position: absolute;
      inset: 20px;
      border-radius: 50%;
      border: 1px solid rgba(192,132,252,0.1);
    }

    .pulse-dot {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #d8b4fe, #7c3aed);
      box-shadow: 0 0 24px rgba(192,132,252,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      transition: box-shadow 0.3s;
    }
    .running .pulse-dot {
      animation: beat var(--beat) ease-in-out infinite;
    }
    @keyframes beat {
      0%   { transform: scale(1);    box-shadow: 0 0 20px rgba(192,132,252,0.3); }
      25%  { transform: scale(1.20); box-shadow: 0 0 50px rgba(192,132,252,0.9); }
      50%  { transform: scale(1);    box-shadow: 0 0 20px rgba(192,132,252,0.3); }
      75%  { transform: scale(1.10); box-shadow: 0 0 35px rgba(192,132,252,0.6); }
      100% { transform: scale(1);    box-shadow: 0 0 20px rgba(192,132,252,0.3); }
    }

    .pulse-hint {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.45);
      text-align: center;
      min-height: 1.4em;
      margin-bottom: 20px;
    }

    /* 버튼 */
    .main-btn {
      width: 210px;
      padding: 18px;
      font-size: 1.2rem;
      font-weight: 900;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: transform 0.1s;
      touch-action: manipulation;
    }
    .main-btn:active { transform: scale(0.93); }

    .btn-start {
      background: linear-gradient(135deg, #a855f7, #7c3aed);
      color: #fff;
      box-shadow: 0 6px 28px rgba(168,85,247,0.5);
    }
    .btn-stop {
      background: linear-gradient(135deg, #f43f5e, #be123c);
      color: #fff;
      animation: stop-glow 0.6s ease-in-out infinite alternate;
    }
    @keyframes stop-glow {
      from { box-shadow: 0 6px 20px rgba(244,63,94,0.4); }
      to   { box-shadow: 0 6px 44px rgba(244,63,94,1);   }
    }

    /* 결과 */
    .result-area {
      margin-top: 22px;
      text-align: center;
      min-height: 130px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .result-row {
      display: flex;
      gap: 28px;
      margin-bottom: 8px;
    }
    .result-cell .lbl {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.45);
      margin-bottom: 2px;
      letter-spacing: 1px;
    }
    .result-cell .val {
      font-size: 1.5rem;
      font-weight: 800;
    }
    .val-actual { color: #7dd3fc; }
    .val-perfect { color: #4ade80; }
    .val-great   { color: #a3e635; }
    .val-good    { color: #facc15; }
    .val-ok      { color: #fb923c; }
    .val-bad     { color: #f87171; }

    .rating-text {
      font-size: 1.7rem;
      font-weight: 900;
      margin: 4px 0;
    }
    .pts-text { font-size: 0.95rem; color: rgba(255,255,255,0.6); }

    .next-btn {
      margin-top: 12px;
      padding: 11px 32px;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 24px;
      background: rgba(255,255,255,0.13);
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
      touch-action: manipulation;
    }
    .next-btn:hover { background: rgba(255,255,255,0.22); }

    /* 오버레이 */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      align-items: center; justify-content: center; z-index: 10;
    }
    .overlay.show { display: flex; }
    .box {
      background: #1a1535;
      border: 1px solid rgba(192,132,252,0.25);
      border-radius: 28px;
      padding: 38px 44px;
      text-align: center;
      max-width: 320px; width: 90%;
      box-shadow: 0 0 80px rgba(192,132,252,0.15);
    }
    .box .em { font-size: 3.5rem; margin-bottom: 10px; }
    .box h2 { font-size: 1.8rem; color: #fff; margin-bottom: 8px; }
    .box p { color: rgba(255,255,255,0.55); margin-bottom: 6px; line-height: 1.7; white-space: pre-line; }
    .box .score-big {
      font-size: 3.2rem; font-weight: 900;
      color: #c084fc;
      text-shadow: 0 0 24px rgba(192,132,252,0.7);
      margin: 10px 0 4px;
    }
    .box .score-max { font-size: 0.9rem; color: rgba(255,255,255,0.35); margin-bottom: 22px; }
    .box .start-btn {
      padding: 14px 36px; font-size: 1rem; font-weight: 700;
      border: none; border-radius: 20px;
      background: linear-gradient(135deg, #a855f7, #7c3aed);
      color: #fff; cursor: pointer;
      box-shadow: 0 4px 20px rgba(168,85,247,0.45);
      touch-action: manipulation;
    }
    .box .back-link {
      display: block; margin-top: 14px;
      color: rgba(255,255,255,0.35); font-size: 0.85rem; text-decoration: none;
    }
    .box .back-link:hover { color: rgba(255,255,255,0.65); }

    /* 난이도 */
    .mode-select {
      display: flex; gap: 8px;
      justify-content: center;
      margin: 14px 0 20px;
    }
    .mode-btn {
      padding: 7px 16px; border-radius: 20px;
      border: 2px solid rgba(192,132,252,0.35);
      background: rgba(192,132,252,0.08);
      color: rgba(255,255,255,0.75);
      font-size: 0.85rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      touch-action: manipulation;
    }
    .mode-btn.active { background: #a855f7; border-color: #a855f7; color: #fff; }

    @media (max-width: 360px) {
      .pulse-wrap { width: 165px; height: 165px; }
      .pulse-dot { width: 72px; height: 72px; font-size: 1.8rem; }
      .target-time { font-size: 3.2rem; }
      .main-btn { width: 180px; }
    }
    @media (orientation: landscape) and (max-height: 500px) {
      body { padding: 8px 20px; flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 0 20px; }
      .back { width: 100%; margin-bottom: 6px; }
      h1 { width: 100%; font-size: 1.3rem; margin-bottom: 6px; text-align: center; }
      .hud { width: 100%; justify-content: center; margin-bottom: 10px; }
      .target-area { margin-bottom: 8px; }
      .target-time { font-size: 2.6rem; }
      .pulse-wrap { width: 130px; height: 130px; margin-bottom: 8px; }
      .pulse-dot { width: 58px; height: 58px; font-size: 1.5rem; }
      .pulse-hint { margin-bottom: 10px; font-size: 0.78rem; }
      .main-btn { width: 160px; padding: 14px; font-size: 1rem; }
      .result-area { margin-top: 10px; }
    }
  </style>
</head>
<body>
  <a class="back" href="index.html">← 놀이터로</a>
  <h1>⏱ 스탑워치</h1>

  <div class="hud">
    <span>🎯 <span id="roundDisp">1</span> / 5</span>
    <span>⭐ <span id="scoreDisp">0</span>점</span>
  </div>

  <div class="target-area">
    <div class="target-label">TARGET</div>
    <div class="target-time"><span id="targetDisp">0.00</span> <span class="unit">초</span></div>
  </div>

  <div class="pulse-wrap" id="pulseWrap">
    <div class="ring-outer"></div>
    <div class="ring-spin"></div>
    <div class="ring-inner"></div>
    <div class="pulse-dot">⏱</div>
  </div>

  <div class="pulse-hint" id="pulseHint">버튼을 눌러 시작해요!</div>

  <button class="main-btn btn-start" id="mainBtn">🎮 시작!</button>

  <div class="result-area" id="resultArea"></div>

  <!-- 시작/결과 오버레이 -->
  <div class="overlay show" id="overlay">
    <div class="box">
      <div class="em" id="oEm">⏱</div>
      <h2 id="oTitle">스탑워치</h2>
      <p id="oMsg">목표 시간을 느낌으로 맞춰봐요!<br/>타이머는 숨겨져 있어요 👀</p>
      <div class="mode-select" id="overlayModes">
        <button class="mode-btn active" data-mode="easy"   onclick="setMode(this)">쉬움</button>
        <button class="mode-btn"        data-mode="normal" onclick="setMode(this)">보통</button>
        <button class="mode-btn"        data-mode="hard"   onclick="setMode(this)">어려움</button>
      </div>
      <button class="start-btn" id="oStartBtn" onclick="startGame()">🎮 시작!</button>
      <a class="back-link" href="index.html">← 놀이터로</a>
    </div>
  </div>

  <script>
    const TOTAL = 5;
    const MODES = {
      easy:   { min: 3.0, max: 8.0, dec: 1, tol: [0.20, 0.45, 0.80, 1.30], beat: '1s',    beatLabel: '1초 박자 🥁' },
      normal: { min: 2.0, max: 7.0, dec: 2, tol: [0.10, 0.25, 0.50, 0.90], beat: '0.6s',  beatLabel: '0.6초 박자 🥁🥁' },
      hard:   { min: 1.5, max: 5.5, dec: 2, tol: [0.05, 0.13, 0.28, 0.55], beat: '0.3s',  beatLabel: '0.3초 박자 🥁🥁🥁' },
    };
    const RATINGS = [
      { label: '🌟 Perfect!',  cls: 'val-perfect', pts: 100 },
      { label: '🔥 Great!',    cls: 'val-great',   pts: 80  },
      { label: '👍 Good!',     cls: 'val-good',     pts: 60  },
      { label: '🙂 OK~',       cls: 'val-ok',       pts: 40  },
      { label: '💪 아쉬워요!', cls: 'val-bad',       pts: 10  },
    ];

    let curMode = 'easy';
    let round = 0, totalScore = 0;
    let target = 0, startTs = 0, timing = false;

    function setMode(btn) {
      curMode = btn.dataset.mode;
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.documentElement.style.setProperty('--beat', MODES[curMode].beat);
    }

    function genTarget() {
      const m = MODES[curMode];
      const raw = m.min + Math.random() * (m.max - m.min);
      const f = Math.pow(10, m.dec);
      return Math.round(raw * f) / f;
    }

    function startGame() {
      round = 0; totalScore = 0;
      document.getElementById('overlayModes').style.display = '';
      document.getElementById('oStartBtn').textContent = '🎮 시작!';
      document.getElementById('overlay').classList.remove('show');
      nextRound();
    }

    function nextRound() {
      round++;
      target = genTarget();
      timing = false;

      const m = MODES[curMode];
      document.documentElement.style.setProperty('--beat', m.beat);

      document.getElementById('roundDisp').textContent = round;
      document.getElementById('scoreDisp').textContent = totalScore;
      document.getElementById('targetDisp').textContent = target.toFixed(m.dec);
      document.getElementById('resultArea').innerHTML = '';
      document.getElementById('pulseHint').textContent = `${m.beatLabel} — 버튼을 눌러 시작해요!`;
      document.getElementById('pulseWrap').classList.remove('running');

      const btn = document.getElementById('mainBtn');
      btn.style.display = '';
      btn.textContent = '🎮 시작!';
      btn.className = 'main-btn btn-start';
    }

    function onStart() {
      if (timing) {
        // STOP
        const elapsed = (performance.now() - startTs) / 1000;
        timing = false;
        stopTick();
        playStop();
        document.getElementById('pulseWrap').classList.remove('running');
        showResult(elapsed);
      } else {
        // START
        timing = true;
        startTs = performance.now();
        playStart();
        startTick();
        document.getElementById('pulseWrap').classList.add('running');
        document.getElementById('pulseHint').textContent = `${MODES[curMode].beatLabel} — 느낌이 왔으면 STOP! 🎯`;
        const btn = document.getElementById('mainBtn');
        btn.textContent = '🛑 STOP!';
        btn.className = 'main-btn btn-stop';
      }
    }

    function showResult(elapsed) {
      const diff = elapsed - target;
      const abs  = Math.abs(diff);
      const tol  = MODES[curMode].tol;
      let ri = 4;
      if      (abs <= tol[0]) ri = 0;
      else if (abs <= tol[1]) ri = 1;
      else if (abs <= tol[2]) ri = 2;
      else if (abs <= tol[3]) ri = 3;

      const { label, cls, pts } = RATINGS[ri];
      totalScore += pts;
      playResult(ri);

      const sign    = diff >= 0 ? '+' : '';
      const diffStr = sign + diff.toFixed(3) + '초';

      document.getElementById('scoreDisp').textContent = totalScore;
      document.getElementById('pulseHint').textContent = '';
      document.getElementById('mainBtn').style.display = 'none';

      const isLast = round >= TOTAL;
      document.getElementById('resultArea').innerHTML = `
        <div class="result-row">
          <div class="result-cell">
            <div class="lbl">실제 시간</div>
            <div class="val val-actual">${elapsed.toFixed(3)}초</div>
          </div>
          <div class="result-cell">
            <div class="lbl">차이</div>
            <div class="val ${cls}">${diffStr}</div>
          </div>
        </div>
        <div class="rating-text">${label}</div>
        <div class="pts-text">+${pts}점</div>
        <button class="next-btn" onclick="${isLast ? 'showFinal()' : 'nextRound()'}">
          ${isLast ? '결과 보기 🏆' : '다음 →'}
        </button>
      `;
    }

    function showFinal() {
      const pct = Math.round(totalScore / (TOTAL * 100) * 100);
      let em, title, msg;
      if      (pct === 100) { em = '🏆'; title = '완벽해요!';  msg = '리듬 감각이 천재예요! 👏'; }
      else if (pct >= 80)   { em = '🌟'; title = '훌륭해요!';  msg = '리듬 감각이 뛰어나요!';   }
      else if (pct >= 60)   { em = '😊'; title = '잘했어요!';  msg = '조금 더 연습해봐요!';      }
      else if (pct >= 40)   { em = '🙂'; title = '괜찮아요!';  msg = '다시 도전해봐요!';         }
      else                  { em = '💪'; title = '다시 해봐요!'; msg = '느낌을 믿어봐요!';        }

      document.getElementById('oEm').textContent    = em;
      document.getElementById('oTitle').textContent  = title;
      document.getElementById('oMsg').textContent    = msg;
      document.getElementById('overlayModes').style.display = 'none';
      document.getElementById('oStartBtn').textContent = '🔄 다시 하기!';

      const box = document.querySelector('.box');
      if (!document.getElementById('scoreBig')) {
        const sb = document.createElement('div');
        sb.id = 'scoreBig';
        sb.className = 'score-big';
        const sm = document.createElement('div');
        sm.className = 'score-max';
        box.insertBefore(sm, document.getElementById('oStartBtn'));
        box.insertBefore(sb, sm);
      }
      document.getElementById('scoreBig').textContent = totalScore + '점';
      document.querySelector('.score-max').textContent = `/ ${TOTAL * 100}점 (${pct}%)`;

      document.getElementById('overlay').classList.add('show');
    }

    // ── Web Audio ──────────────────────────────────────────────
    let audioCtx = null, tickId = null;

    function getAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function beep(freq, dur, vol, type) {
      try {
        const ac = getAudio();
        const osc = ac.createOscillator();
        const g   = ac.createGain();
        osc.connect(g); g.connect(ac.destination);
        osc.type = type || 'sine';
        osc.frequency.setValueAtTime(freq, ac.currentTime);
        g.gain.setValueAtTime(vol || 0.25, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
        osc.start(); osc.stop(ac.currentTime + dur);
      } catch(_) {}
    }

    function playTick() {
      // 박자 틱 — 짧고 부드러운 클릭
      beep(900, 0.04, 0.18, 'sine');
    }

    function playStart() {
      // 시작 — 짧은 상승 효과음
      try {
        const ac = getAudio();
        const osc = ac.createOscillator();
        const g   = ac.createGain();
        osc.connect(g); g.connect(ac.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, ac.currentTime);
        osc.frequency.linearRampToValueAtTime(700, ac.currentTime + 0.12);
        g.gain.setValueAtTime(0.3, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.14);
        osc.start(); osc.stop(ac.currentTime + 0.14);
      } catch(_) {}
    }

    function playStop() {
      // 정지 — 둔탁한 클릭
      beep(180, 0.12, 0.35, 'sine');
    }

    function playResult(ri) {
      // 등급별 결과음
      const seqs = [
        [[523,0],[659,0.1],[784,0.2],[1047,0.3]],  // Perfect: C5 E5 G5 C6 상승
        [[523,0],[784,0.12]],                        // Great: 두 음
        [[660,0]],                                   // Good: 한 음
        [[440,0]],                                   // OK: 낮은 음
        [[220,0],[185,0.14]],                        // Bad: 하강
      ];
      try {
        const ac = getAudio();
        (seqs[ri] || seqs[4]).forEach(([freq, delay]) => {
          const osc = ac.createOscillator();
          const g   = ac.createGain();
          osc.connect(g); g.connect(ac.destination);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, ac.currentTime + delay);
          g.gain.setValueAtTime(0.28, ac.currentTime + delay);
          g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + delay + 0.18);
          osc.start(ac.currentTime + delay);
          osc.stop(ac.currentTime + delay + 0.2);
        });
      } catch(_) {}
    }

    function startTick() {
      stopTick();
      const beatMs = parseFloat(MODES[curMode].beat) * 1000;
      playTick();
      tickId = setInterval(playTick, beatMs);
    }

    function stopTick() {
      clearInterval(tickId);
      tickId = null;
    }
    // ───────────────────────────────────────────────────────────

    // 버튼 이벤트 — pointerdown으로 즉각 반응
    document.getElementById('mainBtn').addEventListener('pointerdown', e => {
      e.preventDefault();
      onStart();
    });

    // 스페이스바 지원
    document.addEventListener('keydown', e => {
      if (e.code === 'Space' && !document.getElementById('overlay').classList.contains('show')) {
        e.preventDefault();
        onStart();
      }
    });
  </script>
  <script>
    document.addEventListener('touchmove', e => { if (e.cancelable && document.body.scrollHeight <= window.innerHeight) e.preventDefault(); }, { passive: false });
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js?v=25'));
    }
  </script>
</body>
