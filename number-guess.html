<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Up & Down 수 맞추기</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#ff9a9e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="놀이터" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nanum Gothic', 'Apple SD Gothic Neo', sans-serif;
      background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
      overscroll-behavior: none;
    }

    .back {
      align-self: flex-start;
      text-decoration: none;
      color: #fff;
      font-size: 1rem;
      margin-bottom: 20px;
      background: rgba(255,255,255,0.25);
      padding: 8px 16px;
      border-radius: 20px;
      transition: background 0.2s;
    }
    .back:hover { background: rgba(255,255,255,0.45); }

    h1 {
      font-size: 2.2rem;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.15);
      margin-bottom: 8px;
    }

    .subtitle {
      color: rgba(255,255,255,0.9);
      margin-bottom: 32px;
      font-size: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 28px;
      padding: 40px 36px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
      text-align: center;
    }

    .range-label {
      font-size: 1rem;
      color: #aaa;
      margin-bottom: 24px;
    }

    .hint-box {
      font-size: 1.6rem;
      font-weight: 700;
      min-height: 56px;
      margin-bottom: 24px;
      color: #555;
    }

    .hint-box .big {
      font-size: 2.8rem;
    }

    input[type="number"] {
      width: 100%;
      padding: 16px;
      font-size: 1.6rem;
      text-align: center;
      border: 3px solid #fad0c4;
      border-radius: 16px;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.2s;
      color: #333;
    }
    input[type="number"]:focus { border-color: #ff6b6b; }

    button {
      width: 100%;
      padding: 16px;
      font-size: 1.2rem;
      font-weight: 700;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    button:hover { opacity: 0.88; transform: scale(0.98); }

    .btn-guess {
      background: #ff6b6b;
      color: #fff;
      margin-bottom: 10px;
    }

    .btn-reset {
      background: #f1f3f5;
      color: #555;
    }

    .tries {
      margin-top: 20px;
      font-size: 0.95rem;
      color: #bbb;
    }

    .result {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 16px;
      min-height: 36px;
    }

    .result.up    { color: #ff6b6b; }
    .result.down  { color: #339af0; }
    .result.win   { color: #51cf66; }

    /* range selector */
    .range-select {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .range-btn {
      padding: 8px 18px;
      border-radius: 20px;
      border: 2px solid #fad0c4;
      background: #fff;
      color: #ff6b6b;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .range-btn.active, .range-btn:hover {
      background: #ff6b6b;
      color: #fff;
      border-color: #ff6b6b;
    }

    @media (orientation: landscape) and (max-height: 500px) {
      body      { padding: 10px 20px; }
      .back     { margin-bottom: 8px; }
      h1        { font-size: 1.5rem; margin-bottom: 2px; }
      .subtitle { font-size: 0.88rem; margin-bottom: 10px; }
      .card {
        padding: 14px 24px;
        max-width: 580px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        column-gap: 24px;
        row-gap: 6px;
        align-items: center;
      }
      .range-select        { grid-column: 1 / -1; margin-bottom: 2px; }
      .range-label         { grid-column: 1 / -1; font-size: 0.8rem; margin-bottom: 2px; }
      .hint-box            { grid-column: 1; grid-row: 3; min-height: 40px; margin-bottom: 0; font-size: 1.3rem; }
      .hint-box .big       { font-size: 1.9rem; }
      .result              { grid-column: 1; grid-row: 4; min-height: 20px; font-size: 0.92rem; }
      .tries               { grid-column: 1; grid-row: 5; margin-top: 0; }
      input[type="number"] { grid-column: 2; grid-row: 3; padding: 11px; font-size: 1.3rem; margin-bottom: 0; }
      .btn-guess           { grid-column: 2; grid-row: 4; padding: 11px; margin-bottom: 0; }
      .btn-reset           { grid-column: 2; grid-row: 5; padding: 9px; }
    }
  </style>
</head>
<body>

  <a class="back" href="index.html">← 놀이터로</a>
  <h1>🔢 Up & Down 수 맞추기</h1>
  <p class="subtitle">숨겨진 숫자를 알아맞혀 보세요!</p>

  <div class="card">
    <div class="range-select">
      <button class="range-btn active" onclick="setRange(1,20)">1~20</button>
      <button class="range-btn" onclick="setRange(1,50)">1~50</button>
      <button class="range-btn" onclick="setRange(1,100)">1~100</button>
    </div>
    <div class="range-label" id="rangeLabel">1 에서 20 사이의 숫자를 맞춰보세요!</div>
    <div class="hint-box" id="hintBox"><span class="big">❓</span></div>
    <div class="result" id="result"></div>
    <input type="number" id="guessInput" placeholder="숫자를 입력하세요" min="1" />
    <button class="btn-guess" onclick="guess()">확인!</button>
    <button class="btn-reset" onclick="reset()">🔄 새 게임</button>
    <div class="tries" id="tries"></div>
  </div>

  <script>
    let secret, min, max, tries, done;

    function setRange(a, b) {
      min = a; max = b;
      document.querySelectorAll('.range-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('rangeLabel').textContent = `${min} 에서 ${max} 사이의 숫자를 맞춰보세요!`;
      document.getElementById('guessInput').min = min;
      document.getElementById('guessInput').max = max;
      reset();
    }

    function reset() {
      min = min || 1;
      max = max || 20;
      secret = Math.floor(Math.random() * (max - min + 1)) + min;
      tries = 0;
      done = false;
      document.getElementById('hintBox').innerHTML = '<span class="big">❓</span>';
      document.getElementById('result').textContent = '';
      document.getElementById('result').className = 'result';
      document.getElementById('tries').textContent = '';
      document.getElementById('guessInput').value = '';
      document.getElementById('guessInput').disabled = false;
      document.getElementById('guessInput').focus();
    }

    function guess() {
      if (done) return;
      const val = parseInt(document.getElementById('guessInput').value);
      if (isNaN(val) || val < min || val > max) {
        document.getElementById('result').textContent = `${min}~${max} 사이 숫자를 입력해주세요!`;
        document.getElementById('result').className = 'result';
        return;
      }
      tries++;
      const resultEl = document.getElementById('result');
      const hintEl = document.getElementById('hintBox');

      if (val === secret) {
        done = true;
        hintEl.innerHTML = '🎉';
        resultEl.textContent = `정답이에요! 🎊`;
        resultEl.className = 'result win';
        document.getElementById('tries').textContent = `${tries}번 만에 맞췄어요!`;
        document.getElementById('guessInput').disabled = true;
      } else if (val < secret) {
        hintEl.innerHTML = '⬆️ <br/><small style="font-size:1rem;color:#aaa">더 크게!</small>';
        resultEl.textContent = `${val} 보다 커요!`;
        resultEl.className = 'result up';
        document.getElementById('tries').textContent = `${tries}번 시도했어요`;
      } else {
        hintEl.innerHTML = '⬇️ <br/><small style="font-size:1rem;color:#aaa">더 작게!</small>';
        resultEl.textContent = `${val} 보다 작아요!`;
        resultEl.className = 'result down';
        document.getElementById('tries').textContent = `${tries}번 시도했어요`;
      }
      document.getElementById('guessInput').value = '';
      document.getElementById('guessInput').focus();
    }

    document.getElementById('guessInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') guess();
    });

    // init
    setRange(1, 20);
    document.querySelectorAll('.range-btn')[0].classList.add('active');
  </script>


  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
    }
  </script>
</body>
</html>
