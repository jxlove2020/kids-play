<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>기억력 게임</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#43e97b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="놀이터" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nanum Gothic', 'Apple SD Gothic Neo', sans-serif;
      background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
      overscroll-behavior: none;
    }

    .back {
      align-self: flex-start;
      text-decoration: none;
      color: #fff;
      font-size: 1rem;
      margin-bottom: 20px;
      background: rgba(255,255,255,0.25);
      padding: 8px 16px;
      border-radius: 20px;
      transition: background 0.2s;
    }
    .back:hover { background: rgba(255,255,255,0.45); }

    h1 {
      font-size: 2.2rem;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.15);
      margin-bottom: 6px;
    }

    .info-bar {
      display: flex;
      gap: 24px;
      margin: 12px 0 28px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
    }
    .info-bar span { background: rgba(255,255,255,0.25); padding: 6px 18px; border-radius: 20px; }

    /* difficulty */
    .diff-select {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .diff-btn {
      padding: 8px 22px;
      border-radius: 20px;
      border: 2px solid rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.2);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .diff-btn.active, .diff-btn:hover {
      background: #fff;
      color: #43e97b;
      border-color: #fff;
    }

    .board {
      display: grid;
      gap: 12px;
      margin-bottom: 24px;
    }

    .cell {
      width: 90px;
      height: 90px;
      perspective: 600px;
      cursor: pointer;
    }

    .cell-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.4s;
      border-radius: 18px;
    }

    .cell.flipped .cell-inner,
    .cell.matched .cell-inner {
      transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.6rem;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    .back-face {
      background: #fff;
      color: #ccc;
      font-size: 2rem;
    }

    .front-face {
      background: #fff;
      transform: rotateY(180deg);
    }

    .cell.matched .front-face {
      background: #d3f9d8;
      box-shadow: 0 4px 16px rgba(81,207,102,0.35);
    }

    .cell.wrong .cell-inner {
      animation: shake 0.4s;
    }
    @keyframes shake {
      0%,100% { transform: rotateY(180deg) translateX(0); }
      25%      { transform: rotateY(180deg) translateX(-6px); }
      75%      { transform: rotateY(180deg) translateX(6px); }
    }

    .btn-reset {
      padding: 14px 40px;
      font-size: 1.1rem;
      font-weight: 700;
      border: none;
      border-radius: 20px;
      background: #fff;
      color: #43e97b;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      transition: transform 0.15s, opacity 0.2s;
    }
    .btn-reset:hover { transform: scale(0.97); opacity: 0.9; }

    .win-banner {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .win-banner.show { display: flex; }
    .win-box {
      background: #fff;
      border-radius: 32px;
      padding: 48px 56px;
      text-align: center;
      box-shadow: 0 16px 60px rgba(0,0,0,0.2);
    }
    .win-box .emoji { font-size: 4rem; margin-bottom: 12px; }
    .win-box h2 { font-size: 2rem; color: #333; margin-bottom: 8px; }
    .win-box p  { color: #888; margin-bottom: 28px; }
    .win-box button {
      padding: 14px 36px;
      font-size: 1.1rem;
      font-weight: 700;
      border: none;
      border-radius: 16px;
      background: #43e97b;
      color: #fff;
      cursor: pointer;
    }

    @media (max-width: 480px) {
      .cell { width: 70px; height: 70px; }
      .face  { font-size: 2rem; }
    }

    @media (orientation: landscape) and (max-height: 500px) {
      body { padding: 8px 20px 12px; }
      .back { margin-bottom: 5px; }
      h1 { font-size: 1.4rem; margin-bottom: 0; }
      .info-bar { margin: 5px 0 7px; gap: 10px; }
      .info-bar span { font-size: 0.8rem; padding: 4px 10px; }
      .diff-select { margin-bottom: 7px; gap: 6px; }
      .diff-btn { padding: 5px 12px; font-size: 0.8rem; }
      .board { gap: 7px; margin-bottom: 10px; }
      .cell { width: 55px; height: 55px; }
      .cell-inner { border-radius: 12px; }
      .face { border-radius: 12px; font-size: 1.6rem; }
      .btn-reset { padding: 9px 24px; font-size: 0.9rem; }
    }
  </style>
</head>
<body>

  <a class="back" href="index.html">← 놀이터로</a>
  <h1>🃏 기억력 게임</h1>

  <div class="info-bar">
    <span>🔁 시도: <span id="tries">0</span></span>
    <span>✅ 맞춤: <span id="matched">0</span> / <span id="total">0</span></span>
  </div>

  <div class="diff-select">
    <button class="diff-btn active" onclick="startGame(3,4, this)">쉬움 (3×4)</button>
    <button class="diff-btn" onclick="startGame(4,4, this)">보통 (4×4)</button>
    <button class="diff-btn" onclick="startGame(4,5, this)">어려움 (4×5)</button>
  </div>

  <div class="board" id="board"></div>

  <button class="btn-reset" onclick="restartGame()">🔄 다시 시작</button>

  <div class="win-banner" id="winBanner">
    <div class="win-box">
      <div class="emoji">🎉</div>
      <h2>대단해요!</h2>
      <p id="winMsg"></p>
      <button onclick="restartGame()">다시 해볼게요!</button>
    </div>
  </div>

  <script>
    const EMOJIS = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯',
                    '🦁','🐮','🐷','🐸','🐵','🐔','🦄','🦋','🌸','🍎'];

    let cols, rows, cards, flipped, matchedCount, tries, lock;
    let currentDiffBtn = null;

    function startGame(c, r, btn) {
      cols = c; rows = r;
      if (currentDiffBtn) currentDiffBtn.classList.remove('active');
      if (btn) { btn.classList.add('active'); currentDiffBtn = btn; }

      const pairCount = (cols * rows) / 2;
      const chosen = EMOJIS.slice(0, pairCount);
      cards = shuffle([...chosen, ...chosen]);

      flipped = [];
      matchedCount = 0;
      tries = 0;
      lock = false;

      document.getElementById('total').textContent = pairCount;
      document.getElementById('matched').textContent = 0;
      document.getElementById('tries').textContent = 0;
      document.getElementById('winBanner').classList.remove('show');

      renderBoard();
    }

    function restartGame() {
      startGame(cols, rows, null);
    }

    function renderBoard() {
      const board = document.getElementById('board');
      board.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      board.innerHTML = '';
      cards.forEach((emoji, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.index = i;
        cell.innerHTML = `
          <div class="cell-inner">
            <div class="face back-face">🌟</div>
            <div class="face front-face">${emoji}</div>
          </div>`;
        cell.addEventListener('click', () => onFlip(cell, i));
        board.appendChild(cell);
      });
    }

    function onFlip(cell, i) {
      if (lock || cell.classList.contains('flipped') || cell.classList.contains('matched')) return;
      cell.classList.add('flipped');
      flipped.push({ cell, i });

      if (flipped.length === 2) {
        lock = true;
        tries++;
        document.getElementById('tries').textContent = tries;

        const [a, b] = flipped;
        if (cards[a.i] === cards[b.i]) {
          // match
          setTimeout(() => {
            a.cell.classList.replace('flipped', 'matched');
            b.cell.classList.replace('flipped', 'matched');
            matchedCount++;
            document.getElementById('matched').textContent = matchedCount;
            flipped = [];
            lock = false;
            if (matchedCount === cards.length / 2) showWin();
          }, 400);
        } else {
          // wrong
          setTimeout(() => {
            a.cell.classList.add('wrong');
            b.cell.classList.add('wrong');
            setTimeout(() => {
              a.cell.classList.remove('flipped', 'wrong');
              b.cell.classList.remove('flipped', 'wrong');
              flipped = [];
              lock = false;
            }, 400);
          }, 600);
        }
      }
    }

    function showWin() {
      const pairCount = cards.length / 2;
      document.getElementById('winMsg').textContent = `${tries}번 시도해서 ${pairCount}쌍을 모두 찾았어요! 🌟`;
      document.getElementById('winBanner').classList.add('show');
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // init
    startGame(3, 4, document.querySelector('.diff-btn.active'));
  </script>


  <script>
    document.addEventListener('touchmove', e => { if (e.cancelable && document.body.scrollHeight <= window.innerHeight) e.preventDefault(); }, { passive: false });
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
    }
  </script>
</body>
</html>
